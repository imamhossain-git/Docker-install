---
# tasks file for demo-role

- name: Update apt cache (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install prerequisites (Debian/Ubuntu)
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == 'Debian'

- name: Create directory for Docker GPG key
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_os_family == 'Debian'

- name: Add Docker's official GPG key (Debian/Ubuntu)
  get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  when: ansible_os_family == 'Debian'

- name: Add Docker repository (Debian/Ubuntu)
  apt_repository:
    repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  when: ansible_os_family == 'Debian'

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Install Docker (Debian/Ubuntu)
  apt:
    name: "{{ docker_package }}"
    state: present
  when: ansible_os_family == 'Debian'

- name: Install prerequisites (RedHat)
  yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present
  when: ansible_os_family == 'RedHat'

- name: Add Docker repository (RedHat)
  yum_repository:
    name: docker
    description: Docker Repository
    baseurl: https://download.docker.com/linux/{{ ansible_distribution | lower }}/$releasever/$basearch/stable
    gpgkey: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    gpgcheck: yes
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: Install Docker (RedHat)
  yum:
    name: "{{ docker_package }}"
    state: present
  when: ansible_os_family == 'RedHat'

- name: Start and enable Docker service
  service:
    name: "{{ docker_service_name }}"
    state: started
    enabled: yes

- name: Add users to docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  with_items: "{{ docker_users }}"
  when: docker_users | length > 0

- name: Install Docker Compose
  get_url:
    url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-{{ ansible_system }}-{{ ansible_architecture }}"
    dest: /usr/local/bin/docker-compose
    mode: '0755'
  when: docker_install_compose

- name: Create symlink for docker-compose
  file:
    src: /usr/local/bin/docker-compose
    dest: /usr/bin/docker-compose
    state: link
  when: docker_install_compose
